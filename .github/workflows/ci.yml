name: CI

# Node.js + pnpm monorepo (frontend: React+Vite+TS / backend: Hono+Prisma+SQLite)。
# 構成の根拠は docs/adr/0002-stack-and-architecture.md を参照。

on:
  push:
  pull_request:
    branches: [main]

# 同一 ref への連続 push で進行中の旧 run を自動キャンセル。
# main は merge 後の検証が後続 push でキャンセルされないように対象外にする。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-test:
    name: build + typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "file:./dev.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # バージョンは package.json の packageManager に従う(version 指定との二重指定を避ける)
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @reqtrack/backend db:generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Unit tests (Vitest)
        run: pnpm -r test

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # バージョンは package.json の packageManager に従う(version 指定との二重指定を避ける)
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @reqtrack/frontend exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @reqtrack/frontend e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
